services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meetroom
      POSTGRES_PASSWORD: meetroom
      POSTGRES_DB: meetroom
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetroom -d meetroom"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://meetroom:meetroom@postgres:5432/meetroom
      JWT_SECRET: dev-secret-troque-em-producao
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
